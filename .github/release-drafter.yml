name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"
template: |
  ## What's Changed

  $CHANGES

  ## Full Changelog

  https://github.com/RiccardoDalFiume/bayrol-ha-rdf/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: "Features"
    labels:
      - "enhancement"
      - "feature"
  - title: "Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "Maintenance"
    labels:
      - "maintenance"
      - "chore"
      - "dependencies"

exclude-labels:
  - "skip-changelog"
