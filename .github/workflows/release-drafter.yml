name: Release Drafter

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update_release_draft:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Update release draft
        uses: "release-drafter/release-drafter@v6"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
