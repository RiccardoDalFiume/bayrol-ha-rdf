name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  pytest:
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: "actions/checkout@v5"

      - name: Set up Python ${{ matrix.python-version }}
        uses: "actions/setup-python@v5"
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: "astral-sh/setup-uv@v5"
        with:
          enable-cache: true

      - name: Sync test dependencies
        run: uv sync --frozen --group test --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/ -v --tb=short
        # Real connection tests are automatically skipped
        # when BAYROL_* env vars are not set (see conftest.py)
