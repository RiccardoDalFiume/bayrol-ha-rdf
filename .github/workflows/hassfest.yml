name: Validate with hassfest

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v5"
      - uses: "home-assistant/actions/hassfest@1.0.0"
